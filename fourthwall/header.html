<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
    :root {
        --gold: #FFD700;
        --crown-gold: #FFD700;
        --obsidian: #0A0A0A;
        --purple-hi: #5000aa;
        --purple-lo: #28007c;
    }

    #ysg-portal-overlay {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        z-index: 2147483647 !important;
        background-color: var(--obsidian) !important;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 60px;
    }

    #ysg-portal-overlay::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
                linear-gradient(90deg, rgba(255, 215, 0, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(255, 215, 0, 0.03) 1px, transparent 1px);
        background-size: 32px 32px;
        z-index: -1;
    }

    #ysg-portal-title {
        font-family: 'VT323', monospace;
        font-size: clamp(48px, 9vw, 90px);
        color: var(--gold);
        text-shadow:
                0 0 10px #FFD700,
                0 0 30px #FFBF00,
                4px 4px 0 #000;
        margin: 0;
        letter-spacing: 4px;
        image-rendering: pixelated;
        text-align: center;
    }

    .ysg-wiki-btn {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #100010 !important;
        padding: 24px 64px !important;
        text-decoration: none !important;
        overflow: hidden;

        border: 4px solid !important;
        border-image-slice: 1 !important;
        border-image-source: linear-gradient(180deg, #5000aa 0%, #28007c 100%) !important;

        transition: transform 0.2s, box-shadow 0.2s !important;
        cursor: pointer;
    }

    .ysg-wiki-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(80, 0, 170, 0.6);
    }

    .ysg-wiki-btn:active {
        transform: scale(0.95);
    }

    .ysg-btn-text {
        position: relative;
        z-index: 10;
        font-family: 'VT323', monospace;
        font-size: 36px;
        color: #fff;
        letter-spacing: 2px;
        white-space: nowrap;
    }

    .ysg-btn-line {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: var(--crown-gold);
        transform: scaleX(0);
        transition: transform 0.3s;
        transform-origin: left;
    }

    .ysg-wiki-btn:hover .ysg-btn-line {
        transform: scaleX(1);
    }

    body {
        overflow: hidden !important;
        height: 100vh !important;
    }
</style>

<div id="ysg-portal-overlay">

    <h1 id="ysg-portal-title">YELLOW SKIPPER GAMES</h1>

    <a href="https://store.king-tajin.dev" class="ysg-wiki-btn">
    <span class="ysg-btn-text">
      Go To New Store ->
    </span>
        <div class="ysg-btn-line"></div>
    </a>

</div>
